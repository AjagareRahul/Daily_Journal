<!DOCTYPE html>
<html>
<head>
    <title>Add Journal Entry</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
        }
        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌿 Add Journal Entry</h2>

    <form method="POST">
        <!-- CSRF token in Django -->
         {% csrf_token %}

        <label>Title</label>
        <input type="text" name="title" placeholder="Enter title">

        <label>Mood</label>
        <select name="mood">
            <option value="happy">😊 Happy</option>
            <option value="neutral">😐 Neutral</option>
            <option value="sad">😢 Sad</option>
        </select>

        <label>Description</label>
        <textarea name="description" rows="5" placeholder="Write your thoughts..."></textarea>

        <button type="submit">Save Entry</button>
    </form>
</div>

</body>
</html>
