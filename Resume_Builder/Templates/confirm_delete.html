<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder - Delete</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 40px; max-width: 450px; text-align: center; }
        .card h2 { font-size: 1.4rem; color: #c62828; margin-bottom: 10px; }
        .card p { color: #666; margin-bottom: 24px; }
        .card p strong { color: #333; }
        .btn-group { display: flex; gap: 12px; }
        .btn-danger { background: #c62828; color: #fff; border: none; padding: 10px 28px; border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: 0.3s; flex: 1; }
        .btn-danger:hover { background: #b71c1c; }
        .btn-cancel { background: #eee; color: #333; border: none; padding: 10px 28px; border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: 0.3s; text-decoration: none; flex: 1; }
        .btn-cancel:hover { background: #ddd; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Delete Resume</h2>
        <p>Are you sure you want to delete <strong>{{ profile.name }}</strong>?</p>
        <div class="btn-group">
            <a href="{% url 'home' %}" class="btn-cancel">Cancel</a>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn-danger">Delete</button>
            </form>
        </div>
    </div>
</body>
</html>
